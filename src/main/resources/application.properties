spring.config.import=optional:file:.env[.properties]

spring.application.name=yomu-achievement

server.port=8083

# Konfigurasi Supabase yang nilainya diambil dari .env
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate (karena tabel dibuat manual)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Sentry — Application Performance Monitoring (APM) ───────────────────────
# Replace the DSN value with your own from https://sentry.io → Project Settings → DSN
sentry.dsn=${SENTRY_DSN:}

# Enable performance tracing for every request (1.0 = 100% sample rate).
# Lower to 0.2 in production (20% sampling) to control volume.
sentry.traces-sample-rate=1.0

# Track slow DB queries: any SQL taking longer than this threshold (ms)
# will be captured as a Sentry performance transaction with the query attached.
sentry.enable-aot-compatibility=true
sentry.enable-db-query-tracing=true
sentry.slow-request-threshold=500

# APDEX: The "T" value (target response time in ms).
# APDEX score = (Satisfied + 0.5 * Tolerating) / Total requests
# Satisfied  = response < T        (default: 500ms)
# Tolerating = response < 4T       (= 2000ms)
# Frustrated = response >= 4T
sentry.trace-propagation-targets[0]=localhost

# Enables logging of Sentry SDK activity (useful during setup, disable in prod)
logging.level.io.sentry=INFO