name: CI/CD Pipeline - Achievements Module to AWS ECR

on:
  push:
    branches: [main, ci-cd]
  pull_request:
    branches: [main, ci-cd]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v3

      - name: 2. Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      - name: 3. Run Unit Tests (TDD Safeguard)
        run: |
          chmod +x gradlew
          ./gradlew test
        # Kalau test gagal, pipeline akan STOP di sini. Aman!

      - name: 4. Build JAR
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar

      - name: 5. Configure AWS Credentials
        # Step 5-7 hanya jalan kalau di branch main (bukan pas PR)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: 6. Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: 7. Build and Push to ECR
        if: github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: yomu-achievements-production # Sesuaikan dengan nama repo ECR kamu
          IMAGE_TAG: latest
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
